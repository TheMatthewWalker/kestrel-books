# Production stack: Caddy (automatic HTTPS + HSTS) → API → PostgreSQL.
# Secrets come from a .env file next to this compose file (never committed):
#   DOMAIN=api.yourpractice.co.uk
#   POSTGRES_PASSWORD=...
#   JWT_KEY=...
#   SMTP_PASSWORD=... etc.
# Prefer a managed PostgreSQL with point-in-time recovery over the bundled db
# service — keep db here only for the smallest possible start.
services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

  api:
    image: ghcr.io/thematthewwalker/kestrel-books:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Database=kestrelbooks;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__From: ${SMTP_FROM:-}
      Hmrc__ClientId: ${HMRC_CLIENT_ID:-}
      Hmrc__ClientSecret: ${HMRC_CLIENT_SECRET:-}
      Hmrc__RedirectUri: https://${DOMAIN}/api/mtd/callback
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY:-}
      Sentry__Dsn: ${SENTRY_DSN:-}
      S3__Endpoint: ${S3_ENDPOINT:-}
      S3__Bucket: ${S3_BUCKET:-}
      S3__AccessKey: ${S3_ACCESS_KEY:-}
      S3__SecretKey: ${S3_SECRET_KEY:-}
    volumes:
      - apistorage:/app/Storage

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: kestrelbooks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

volumes:
  pgdata:
  apistorage:
  caddydata:
  caddyconfig:
